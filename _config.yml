title: Tiny-LLM
description: Lightweight LLM Inference Engine — W8A16 quantization, KV Cache, CUDA kernels
author: LessUp
url: https://lessup.github.io
baseurl: /tiny-llm
lang: en

# Theme
remote_theme: pages-themes/cayman@v0.2.0
show_downloads: false
repository: LessUp/tiny-llm

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Navigation
header_pages:
  - index.md
  - docs/index.md
  - docs/en/README.md
  - docs/zh/README.md
  - CONTRIBUTING.md

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# SEO
twitter:
  username: lessup
  card: summary

social:
  name: LessUp
  links:
    - https://github.com/LessUp

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default
  - scope:
      path: "changelog/en"
    values:
      layout: default
  - scope:
      path: "changelog/zh"
    values:
      layout: default
  - scope:
      path: "docs"
    values:
      layout: default
  - scope:
      path: "docs/en"
    values:
      layout: default
  - scope:
      path: "docs/zh"
    values:
      layout: default

# Exclude
exclude:
  - .git
  - .github
  - .kiro
  - .vscode
  - .cache
  - include
  - kernels
  - src
  - tests
  - build
  - CMakeLists.txt
  - CMakePresets.json
  - Dockerfile
  - .clang-format
  - .clang-tidy
  - .editorconfig
  - .gitattributes
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - vendor
  - "*.cpp"
  - "*.cu"
  - "*.cuh"
  - "*.h"

# Include
include:
  - 404.html

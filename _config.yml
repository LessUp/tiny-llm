title: Tiny-LLM
description: Lightweight LLM Inference Engine — W8A16 quantization, KV Cache, multi-sampling strategies
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
repository: LessUp/tiny-llm
show_downloads: false

# SEO & metadata
url: https://lessup.github.io
baseurl: /tiny-llm
lang: zh-CN
author: LessUp

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# Default layout for all pages
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "changelog"
    values:
      layout: default

# Exclude source code and build artifacts from Jekyll build
exclude:
  - .git
  - .github
  - .kiro
  - .vscode
  - .cache
  - include
  - kernels
  - src
  - tests
  - build
  - CMakeLists.txt
  - CMakePresets.json
  - Dockerfile
  - .clang-format
  - .clang-tidy
  - .editorconfig
  - .gitattributes
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - vendor

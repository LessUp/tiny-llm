<!-- PWA Update Notification -->
<div id="update-notification" class="update-notification" style="display: none;">
  <div class="update-content">
    <span>📦 New version available!</span>
    <button id="update-app-btn">Update Now</button>
    <button id="dismiss-update-btn">Later</button>
  </div>
</div>

<!-- Theme Toggle Script -->
<script>
  (function() {
    const toggleBtn = document.getElementById('theme-toggle-btn');
    const lightIcon = document.querySelector('.theme-icon-light');
    const darkIcon = document.querySelector('.theme-icon-dark');
    
    // Check current theme
    function updateIcons() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
      if (currentTheme === 'dark') {
        lightIcon.style.display = 'none';
        darkIcon.style.display = 'block';
      } else {
        lightIcon.style.display = 'block';
        darkIcon.style.display = 'none';
      }
    }
    
    // Initial icon state
    updateIcons();
    
    // Toggle handler
    toggleBtn.addEventListener('click', function() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      
      updateIcons();
    });
    
    // Listen for system theme changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
      if (!localStorage.getItem('theme')) {
        const newTheme = e.matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        updateIcons();
      }
    });
    
    // PWA Update handling
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      
      navigator.serviceWorker.addEventListener('message', function(event) {
        if (event.data.type === 'UPDATE_AVAILABLE') {
          showUpdateNotification();
        }
      });
      
      // Check for updates periodically
      setInterval(function() {
        navigator.serviceWorker.ready.then(function(registration) {
          registration.update();
        });
      }, 60000); // Check every minute
      
      function showUpdateNotification() {
        const notification = document.getElementById('update-notification');
        notification.style.display = 'block';
        
        document.getElementById('update-app-btn').addEventListener('click', function() {
          if (confirm('Update to latest version? The page will reload.')) {
            navigator.serviceWorker.ready.then(function(registration) {
              registration.waiting?.postMessage({ type: 'SKIP_WAITING' });
            });
          }
        });
        
        document.getElementById('dismiss-update-btn').addEventListener('click', function() {
          notification.style.display = 'none';
        });
      }
      
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    }
  })();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     Tiny-LLM Custom Head - Advanced Features
     Features: PWA, Theme Toggle, Custom Fonts, Analytics
     ═══════════════════════════════════════════════════════════════ -->

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="{{ site.url }}{{ site.baseurl }}/">
<meta property="og:title" content="{{ page.title | default: site.title | escape }}">
<meta property="og:description" content="{{ page.description | default: site.description | escape }}">
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/og-image.png">

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="{{ site.url }}{{ site.baseurl }}/">
<meta property="twitter:title" content="{{ page.title | default: site.title | escape }}">
<meta property="twitter:description" content="{{ page.description | default: site.description | escape }}">
<meta property="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/twitter-card.png">

<!-- Apple Touch Icons -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tiny-LLM">

<!-- Microsoft Tiles -->
<meta name="msapplication-TileColor" content="#0d1117">

<!-- Preconnect for Performance -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Theme Toggle Script (Inline for Performance) -->
<script>
  (function() {
    const savedTheme = localStorage.getItem('theme');
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initialTheme = savedTheme || (systemDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', initialTheme);
  })();
</script>

  "offers": {

  }
}
</script>

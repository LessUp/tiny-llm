<!-- Tiny-LLM Custom Head -->

<!-- Open Graph / Social Meta -->
<meta property="og:type" content="website">
<meta property="og:url" content="{{ site.url }}{{ site.baseurl }}{{ page.url }}">
<meta property="og:title" content="{{ page.title | default: site.title | escape }}">
<meta property="og:description" content="{{ page.description | default: site.description | escape }}">
<meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/logo.svg">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
<meta name="twitter:description" content="{{ page.description | default: site.description | escape }}">
<meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/logo.svg">

<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tiny-LLM">
<meta name="msapplication-TileColor" content="#0d1117">

<!-- Fonts - Use system fonts with Inter as fallback -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Theme Toggle Support (compatible with Just the Docs) -->
<script>
(function() {
  // Migrate old theme storage format if needed
  var oldTheme = localStorage.getItem('theme');
  if (oldTheme && !localStorage.getItem('themeFormat')) {
    // Already in correct format, just mark as migrated
    localStorage.setItem('themeFormat', 'v2');
  }
  
  // Check for saved theme preference or prefer-color-scheme
  var savedTheme = localStorage.getItem('theme');
  var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  
  // Clear any existing theme classes first
  document.documentElement.classList.remove('dark-theme', 'light-theme');
  
  if (savedTheme === 'light' || savedTheme === 'dark') {
    // Use saved preference
    document.documentElement.classList.add(savedTheme + '-theme');
  } else if (systemDark) {
    document.documentElement.classList.add('dark-theme');
  } else {
    document.documentElement.classList.add('light-theme');
  }
  
  // Store the effective theme
  var effectiveTheme = document.documentElement.classList.contains('light-theme') ? 'light' : 'dark';
  localStorage.setItem('theme', effectiveTheme);
})();
</script>

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('{{ site.baseurl }}/sw.js');
  });
}
</script>

# Tiny-LLM Documentation Site Configuration
# Jekyll with Just the Docs Theme

# Site Settings
title: Tiny-LLM
description: High-Performance CUDA Inference Engine for LLMs
tagline: Lightweight LLM inference with W8A16 quantization and KV Cache optimization
author: LessUp
url: "https://lessup.github.io"
baseurl: "/tiny-llm"
lang: en

# Theme Configuration
theme: just-the-docs
color_scheme: dark

# Search Configuration
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Code Blocks
enable_copy_code_button: true

# Mermaid Diagrams
mermaid:
  version: "10.6.1"

# Navigation
aux_links:
  "GitHub":
    - "https://github.com/LessUp/tiny-llm"
  "Releases":
    - "https://github.com/LessUp/tiny-llm/releases"
aux_links_new_tab: true

nav_external_links:
  - title: GitHub
    url: https://github.com/LessUp/tiny-llm
    hide_icon: false
  - title: Releases
    url: https://github.com/LessUp/tiny-llm/releases
    hide_icon: false

nav_sort: case_insensitive

# Footer
footer_content: "Copyright &copy; 2026 LessUp. Distributed under MIT License."
back_to_top: true
back_to_top_text: "Back to top"

# TOC
heading_anchors: true
toc:
  enabled: true
  h_min: 2
  h_max: 3

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Markdown Configuration
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true
      start_line: 1
    span:
      line_numbers: false

# SEO & Social
logo: "/assets/images/logo.svg"
twitter:
  card: summary
  username: lessup

social:
  name: Tiny-LLM
  links:
    - https://github.com/LessUp/tiny-llm

# Custom Variables
version: "2.0.2"
release_url: https://github.com/LessUp/tiny-llm/releases/latest
repo_url: https://github.com/LessUp/tiny-llm
docs_url: https://lessup.github.io/tiny-llm/docs

# Sass Configuration
sass:
  sass_dir: _sass
  style: compressed

# Build Settings
exclude:
  - .git
  - .github
  - Gemfile
  - Gemfile.lock
  - "*.cpp"
  - "*.cu"
  - "*.cuh"
  - "*.h"
  - README.md
  - CONTRIBUTING.md

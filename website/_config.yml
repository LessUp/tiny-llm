# ═══════════════════════════════════════════════════════════════
# Tiny-LLM Documentation - Modern Jekyll Configuration
# Theme: Just the Docs (Custom Enhanced)
# Features: PWA, Dark Mode, Search, Modern UI
# ═══════════════════════════════════════════════════════════════

title: Tiny-LLM
description: High-Performance CUDA Inference Engine for LLMs
tagline: Lightweight, efficient LLM inference with W8A16 quantization and KV Cache optimization
author: LessUp Team
url: "https://lessup.github.io"
baseurl: "/tiny-llm"
lang: en

# ═══════════════════════════════════════════════════════════════
# THEME CONFIGURATION
# ═══════════════════════════════════════════════════════════════
remote_theme: just-the-docs/just-the-docs@v0.7.0

# Theme Color Scheme
color_scheme: dark

# Enable search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Enable copy code button
enable_copy_code_button: true

# Mermaid diagrams
mermaid:
  version: "10.6.1"

# Aux links (top right navigation)
aux_links:
  "GitHub":
    - "https://github.com/LessUp/tiny-llm"
  "Releases":
    - "https://github.com/LessUp/tiny-llm/releases"
aux_links_new_tab: true

# Footer content
footer_content: "Copyright &copy; 2025 LessUp. Distributed under MIT License."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# TOC
heading_anchors: true
toc:
  enabled: true
  h_min: 2
  h_max: 3

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# ═══════════════════════════════════════════════════════════════
# PLUGINS
# ═══════════════════════════════════════════════════════════════
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  - jekyll-include-cache

# ═══════════════════════════════════════════════════════════════
# NAVIGATION STRUCTURE
# ═══════════════════════════════════════════════════════════════
nav_external_links:
  - title: GitHub
    url: https://github.com/LessUp/tiny-llm
    hide_icon: false
  - title: Releases
    url: https://github.com/LessUp/tiny-llm/releases
    hide_icon: false

# Navigation order and structure
nav_sort: case_insensitive

# ═══════════════════════════════════════════════════════════════
# MARKDOWN & CODE HIGHLIGHTING
# ═══════════════════════════════════════════════════════════════
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true
      start_line: 1
    span:
      line_numbers: false

# ═══════════════════════════════════════════════════════════════
# SEO & SOCIAL
# ═══════════════════════════════════════════════════════════════
twitter:
  username: lessup
  card: summary_large_image

social:
  name: Tiny-LLM
  links:
    - https://github.com/LessUp/tiny-llm

logo: "/assets/images/logo.svg"
favicon_ico: "/assets/icons/icon-192x192.svg"

# ═══════════════════════════════════════════════════════════════
# PWA CONFIGURATION
# ═══════════════════════════════════════════════════════════════
pwa:
  enabled: true
  name: Tiny-LLM Docs
  short_name: TinyLLM
  description: High-Performance CUDA Inference Engine Documentation
  theme_color: "#0d1117"
  background_color: "#0d1117"
  display: standalone
  orientation: portrait
  scope: "/tiny-llm/"
  start_url: "/tiny-llm/"

# ═══════════════════════════════════════════════════════════════
# DEFAULTS (FRONTMATTER)
# ═══════════════════════════════════════════════════════════════
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      nav_exclude: false
  - scope:
      path: "docs"
    values:
      layout: "page"
  - scope:
      path: "docs/en"
    values:
      lang: en
      layout: "page"
  - scope:
      path: "docs/zh"
    values:
      lang: zh
      layout: "page"
  - scope:
      path: "changelog"
    values:
      layout: "page"
      nav_order: 99

# ═══════════════════════════════════════════════════════════════
# EXCLUDE & INCLUDE
# ═══════════════════════════════════════════════════════════════
exclude:
  - .git
  - .github
  - .kiro
  - .vscode
  - Gemfile
  - Gemfile.lock
  - "*.cpp"
  - "*.cu"
  - "*.cuh"
  - "*.h"

# ═══════════════════════════════════════════════════════════════
# CUSTOM VARIABLES
# ═══════════════════════════════════════════════════════════════
version: "2.1.0"
release_url: https://github.com/LessUp/tiny-llm/releases/latest
repo_url: https://github.com/LessUp/tiny-llm
docs_url: https://lessup.github.io/tiny-llm/docs

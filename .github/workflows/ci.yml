name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
    paths-ignore:
      - '**/*.md'
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: Check formatting
        run: |
          find . -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.cu' -o -name '*.cuh' \) \
            ! -path './build/*' \
            ! -path './.git/*' \
            ! -path './third_party/*' \
            ! -path './vendor/*' \
            ! -path './external/*' \
            ! -path './.kiro/*' \
            | xargs clang-format-18 --dry-run --Werror

  build-test:
    name: Build and Test
    runs-on: ubuntu-22.04
    needs: format
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup GCC and CUDA
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-10 g++-10
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 100
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc 30
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++ 30

          if command -v nvcc >/dev/null 2>&1; then
            nvcc --version
          elif [ -d "/usr/local/cuda" ]; then
            echo "CUDA_HOME=/usr/local/cuda" >> "$GITHUB_ENV"
            echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
            echo "CUDACXX=/usr/local/cuda/bin/nvcc" >> "$GITHUB_ENV"
            nvcc --version
          elif [ -d "/usr/lib/nvidia-cuda-toolkit" ]; then
            echo "CUDA_HOME=/usr/lib/nvidia-cuda-toolkit" >> "$GITHUB_ENV"
            echo "/usr/lib/nvidia-cuda-toolkit/bin" >> "$GITHUB_PATH"
            echo "CUDACXX=/usr/lib/nvidia-cuda-toolkit/bin/nvcc" >> "$GITHUB_ENV"
            nvcc --version
          else
            sudo apt-get install -y nvidia-cuda-toolkit
            echo "CUDA_HOME=/usr/lib/nvidia-cuda-toolkit" >> "$GITHUB_ENV"
            echo "/usr/lib/nvidia-cuda-toolkit/bin" >> "$GITHUB_PATH"
            echo "CUDACXX=/usr/lib/nvidia-cuda-toolkit/bin/nvcc" >> "$GITHUB_ENV"
            nvcc --version
          fi

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_CUDA_HOST_COMPILER=/usr/bin/g++-10 \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --timeout 300

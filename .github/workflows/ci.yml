name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'changelog/**'
      - '_config.yml'
      - '.github/workflows/pages.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: Format C/C++/CUDA files
        run: |
          find . -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.cu' -o -name '*.cuh' \) \
            ! -path './build/*' \
            ! -path './.git/*' \
            ! -path './third_party/*' \
            ! -path './vendor/*' \
            ! -path './external/*' \
            ! -path './.kiro/*' \
            | xargs clang-format-18 -i

      - name: Commit formatting changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "style: auto-format C/C++/CUDA files [skip ci]"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [format-check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CUDA Environment
        run: |
          # Find CUDA installation
          if [ -d "/usr/local/cuda" ]; then
            CUDA_HOME="/usr/local/cuda"
          elif ls -d /usr/local/cuda-* 2>/dev/null | head -1; then
            CUDA_HOME=$(ls -d /usr/local/cuda-* 2>/dev/null | head -1)
          else
            echo "CUDA not installed on runner"
            exit 1
          fi
          
          echo "CUDA_HOME=$CUDA_HOME" >> $GITHUB_ENV
          echo "$CUDA_HOME/bin" >> $GITHUB_PATH
          echo "CUDACXX=$CUDA_HOME/bin/nvcc" >> $GITHUB_ENV
          
          # Verify
          $CUDA_HOME/bin/nvcc --version

      - name: Cache CMake Build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-build-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', '**/*.cmake', 'kernels/**', 'src/**', 'include/**') }}
          restore-keys: |
            cmake-build-${{ runner.os }}-

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure --timeout 300

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [format-check, build]
    if: always()
    steps:
      - name: Check Status
        run: |
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "::error::Build failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "::notice::All tests passed"
          fi
          echo "CI passed successfully"

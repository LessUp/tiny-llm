name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'changelog/**'
      - 'website/**'
      - '.github/workflows/pages.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18

      - name: Format C/C++/CUDA files
        run: |
          find . -type f \( -name '*.cpp' -o -name '*.h' -o -name '*.cu' -o -name '*.cuh' \) \
            ! -path './build/*' \
            ! -path './.git/*' \
            ! -path './third_party/*' \
            ! -path './vendor/*' \
            ! -path './external/*' \
            ! -path './.kiro/*' \
            | xargs clang-format-18 -i

      - name: Commit formatting changes
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "style: auto-format C/C++/CUDA files [skip ci]"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [format-check]
    if: always() && (needs.format-check.result == 'success' || needs.format-check.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CUDA Environment
        run: |
          # Install GCC 10 for CUDA compatibility (GCC 11 has issues with nvcc)
          sudo apt-get update
          sudo apt-get install -y gcc-10 g++-10
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 100
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc 30
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++ 30

          # Check for pre-installed CUDA
          if command -v nvcc &> /dev/null; then
            echo "nvcc already in PATH"
            nvcc --version
          elif [ -d "/usr/local/cuda" ]; then
            echo "CUDA_HOME=/usr/local/cuda" >> $GITHUB_ENV
            echo "/usr/local/cuda/bin" >> $GITHUB_PATH
            echo "CUDACXX=/usr/local/cuda/bin/nvcc" >> $GITHUB_ENV
            nvcc --version
          elif [ -d "/usr/lib/nvidia-cuda-toolkit" ]; then
            echo "CUDA_HOME=/usr/lib/nvidia-cuda-toolkit" >> $GITHUB_ENV
            echo "/usr/lib/nvidia-cuda-toolkit/bin" >> $GITHUB_PATH
            echo "CUDACXX=/usr/lib/nvidia-cuda-toolkit/bin/nvcc" >> $GITHUB_ENV
            nvcc --version
          else
            echo "CUDA not found, installing..."
            sudo apt-get install -y nvidia-cuda-toolkit
            echo "CUDA_HOME=/usr/lib/nvidia-cuda-toolkit" >> $GITHUB_ENV
            echo "/usr/lib/nvidia-cuda-toolkit/bin" >> $GITHUB_PATH
            echo "CUDACXX=/usr/lib/nvidia-cuda-toolkit/bin/nvcc" >> $GITHUB_ENV
            nvcc --version
          fi

          # Verify GCC version
          echo "Using GCC version:"
          gcc --version

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-cuda-build
          max-size: 500M

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure --timeout 300

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [format-check, build]
    if: always() && (needs.format-check.result == 'success' || needs.format-check.result == 'skipped') && needs.build.result == 'success'
    steps:
      - name: Check Status
        run: |
          echo "::notice::All tests passed"
          echo "CI passed successfully"

# ═══════════════════════════════════════════════════════════════
# Tiny-LLM GitHub Pages - Production Deployment
# Features: PWA, Modern Theme, Search Optimization
# ═══════════════════════════════════════════════════════════════

name: GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════════════
  # BUILD JOB
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install dependencies
        working-directory: website
        run: bundle install

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site with Jekyll
        working-directory: website
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}" \
            --destination ../_site \
            --trace
        env:
          JEKYLL_ENV: production
          JEKYLL_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build output
        run: |
          echo "Verifying build output..."
          test -d ./_site || { echo "Error: _site directory not found"; exit 1; }
          test -f ./_site/index.html || echo "Warning: index.html not found"
          echo "Build successful!"
          ls -la ./_site/ | head -20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # ═══════════════════════════════════════════════════════════════
  # DEPLOY JOB
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # VALIDATION JOB (PR only)
  # ═══════════════════════════════════════════════════════════════
  validate:
    name: Validate Build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ./_site

      - name: List built files
        run: ls -laR ./_site/

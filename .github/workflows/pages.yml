name: GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'index.md'
      - 'docs/**'
      - 'changelog/**'
      - '_config.yml'
      - 'README.md'
      - 'README.zh-CN.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.github/workflows/pages.yml'
      - '404.html'
  pull_request:
    branches: [master, main]
    paths:
      - 'index.md'
      - 'docs/**'
      - 'changelog/**'
      - '_config.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            index.md
            _config.yml
            README.md
            README.zh-CN.md
            CONTRIBUTING.md
            LICENSE
            404.html
            docs/
            changelog/
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Cache Ruby Gems
        uses: actions/cache@v4
        with:
          path: |
            ~/.gem
            vendor/bundle
          key: ruby-gems-${{ runner.os }}-${{ hashFiles('Gemfile', 'Gemfile.lock') }}
          restore-keys: |
            ruby-gems-${{ runner.os }}-

      - name: Install Jekyll
        run: |
          gem install bundler
          bundle init || true
          bundle add jekyll jekyll-remote-theme jekyll-seo-tag jekyll-sitemap kramdown

      - name: Build with Jekyll
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}" \
            --destination ./_site
        env:
          JEKYLL_ENV: production

      - name: Generate Sitemap
        if: github.event_name != 'pull_request'
        run: |
          echo "Sitemap generated by jekyll-sitemap plugin"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy Pages
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

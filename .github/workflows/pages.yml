# ═══════════════════════════════════════════════════════════════
# Tiny-LLM GitHub Pages - Advanced Deployment
# Features: PWA, Custom Theme, Search Optimization
# ═══════════════════════════════════════════════════════════════

name: GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'index.md'
      - 'docs/**'
      - 'changelog/**'
      - '_config.yml'
      - '_includes/**'
      - '_layouts/**'
      - '_sass/**'
      - 'assets/**'
      - 'manifest.json'
      - 'sw.js'
      - '404.html'
      - '.github/workflows/pages.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'index.md'
      - 'docs/**'
      - 'changelog/**'
      - '_config.yml'
      - '_includes/**'
      - '_layouts/**'
      - '_sass/**'
      - 'assets/**'
      - 'manifest.json'
      - 'sw.js'
      - '404.html'
  workflow_dispatch:

# Sets permissions for the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════════════
  # BUILD JOB
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site with Jekyll
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}" \
            --destination ./_site \
            --trace
        env:
          JEKYLL_ENV: production
          JEKYLL_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify PWA assets
        run: |
          echo "Verifying PWA manifest and service worker..."
          test -f ./_site/manifest.json || echo "Warning: manifest.json not found"
          test -f ./_site/sw.js || echo "Warning: sw.js not found"

          # List built assets
          echo "Built site structure:"
          ls -la ./_site/ | head -20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # ═══════════════════════════════════════════════════════════════
  # DEPLOY JOB
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ═══════════════════════════════════════════════════════════════
  # VALIDATION JOB (PR only)
  # ═══════════════════════════════════════════════════════════════
  validate:
    name: Validate Build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ./_site

      - name: Validate HTML
        uses: anishathalye/proof-html@v2
        with:
          directory: ./_site
          enforce_https: false
          url_ignore: |
            linkedin.com
            twitter.com

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --base ./_site --exclude-all-private ./_site
          fail: false

# Tiny-LLM API Specification
# Human-readable API definition for the inference engine

## Core Types

### ModelConfig
Configuration for loading a Transformer model.

| Field | Type | Description |
|-------|------|-------------|
| vocab_size | int | Vocabulary size |
| hidden_dim | int | Hidden dimension |
| num_layers | int | Number of Transformer layers |
| num_heads | int | Number of attention heads |
| num_kv_heads | int | Number of KV heads (for GQA) |
| head_dim | int | Dimension per head |
| intermediate_dim | int | FFN intermediate dimension |
| max_seq_len | int | Maximum sequence length |
| rope_theta | float | RoPE theta |
| rms_norm_eps | float | RMSNorm epsilon |

### GenerationConfig
Configuration for text generation.

| Field | Type | Description |
|-------|------|-------------|
| max_new_tokens | int | Maximum tokens to generate |
| temperature | float | Sampling temperature |
| top_k | int | Top-k sampling parameter |
| top_p | float | Top-p (nucleus) sampling parameter |
| eos_token_id | int | End-of-sequence token ID |

## Public API

### InferenceEngine::load(path, config) -> Result<InferenceEngine>
Load a model from file path with given configuration.

**Parameters:**
- `path`: Model file path (string)
- `config`: ModelConfig struct

**Returns:**
- `Result<InferenceEngine>`: Engine instance or error

**Errors:**
- File not found
- Corrupted model file
- GPU memory allocation failure
- Invalid model dimensions

### InferenceEngine::generate(tokens, config) -> vector<int>
Generate tokens from a prompt.

**Parameters:**
- `tokens`: Input token IDs (vector<int>)
- `config`: GenerationConfig struct

**Returns:**
- Generated token sequence including input tokens

### InferenceEngine::prefill(tokens) -> void
Process input tokens in parallel (prefill phase).

### InferenceEngine::decodeStep(config) -> int
Generate a single token (decode phase).

**Returns:**
- Next token ID

## Error Types

| Error | Description |
|-------|-------------|
| CudaException | CUDA runtime error with file and line |
| ModelLoadError | Failed to load or validate model |
| OutOfMemoryError | GPU memory exhausted |
| InvalidModelError | Model file corrupted or invalid |
